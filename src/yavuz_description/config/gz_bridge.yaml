# ROS-GZ Köprüsü Konfigürasyonu
# Gazebo Harmonic <-> ROS2 Jazzy topic eşlemeleri

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/yavuz/imu/data"
  gz_topic_name: "/yavuz/imu/data"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/yavuz/camera/image_raw"
  gz_topic_name: "/yavuz/camera/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/yavuz/ground_truth/odom"
  gz_topic_name: "/model/yavuz_auv/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/yavuz/thruster0/cmd"
  gz_topic_name: "/yavuz/thruster0/cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ

